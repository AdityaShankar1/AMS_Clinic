name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DOCTOR_KEY: ${{ secrets.DOCTOR_KEY }}
          RECEPTIONIST_KEY: ${{ secrets.RECEPTIONIST_KEY }}
          PATIENT_KEY: ${{ secrets.PATIENT_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DEMO_PATIENT_ID: "1"
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t clinic-ams:latest .
      - name: Start container
        run: |
          docker run -d --name clinic-test \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DOCTOR_KEY="test-key" \
            -e RECEPTIONIST_KEY="test-key" \
            -e PATIENT_KEY="test-key" \
            -e JWT_SECRET="test-jwt-secret-min-32-chars-here" \
            -e DEMO_PATIENT_ID="1" \
            -p 8000:8000 \
            clinic-ams:latest
      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Server ready"
              exit 0
            fi
            echo "Attempt $i — waiting..."
            sleep 3
          done
          docker logs clinic-test
          exit 1
      - name: Stop container
        if: always()
        run: docker stop clinic-test || true
